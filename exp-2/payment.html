<!DOCTYPE html>
<html>
<head>

<title>Payment</title>

<link rel="stylesheet"
href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css">

</head>

<body class="container">

<h2 class="mt-5">Payment Page</h2>

<div class="card p-4" style="width:400px">

<label>Card Number</label>
<input type="text" class="form-control mb-3" placeholder="Enter card number">

<label>Card Holder Name</label>
<input type="text" class="form-control mb-3" placeholder="Enter name">

<label>Expiry Date</label>
<input type="month" class="form-control mb-3">

<label>CVV</label>
<input type="password" class="form-control mb-3" placeholder="CVV">

<button class="btn btn-success">Pay Now</button>

</div>

</body>
</html>
